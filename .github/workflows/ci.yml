name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    name: ci
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Intentional branch protection smoke failure
        if: github.event_name == 'pull_request' && github.head_ref == 'chore/branch-protection-smoke-test'
        run: exit 1

      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Set up Node.js
        uses: actions/setup-node@v7
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: |
            package-lock.json
            server/package-lock.json

      - name: Install frontend dependencies
        run: npm ci

      - name: Install server dependencies
        run: npm ci --prefix server

      - name: Run contract tests
        run: npm run test:contracts

      - name: Run strict TypeScript check
        run: npx --no-install tsc --noEmit --pretty false

      - name: Build production frontend
        run: npm run build
